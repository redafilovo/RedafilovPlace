<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RedafilovPlace</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>RedafilovPlace</h1>

<h3 id="welcome"></h3>

<textarea id="postText" rows="5" cols="50"
placeholder="Напишите что-нибудь..."></textarea>

<br><br>

<button id="publishBtn">Опубликовать</button>

<br><br>

<button id="logoutBtn">Выйти</button>

<h2>Лента</h2>

<div id="feed"></div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
ref,
get,
push
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let currentUserName = "";

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

let userSnap = await get(ref(db,"users/"+user.uid));

if(userSnap.exists()){

currentUserName = userSnap.val().username;

document.getElementById("welcome").innerHTML =
"Добро пожаловать, "+currentUserName;

}

loadFeed();

});

document.getElementById("publishBtn").onclick = async()=>{

let text = document.getElementById("postText").value;

if(text=="") return;

await push(ref(db,"posts"),{

author: currentUserName,
text: text

});

document.getElementById("postText").value="";

loadFeed();

};

document.getElementById("logoutBtn").onclick=()=>{

signOut(auth);

};

async function loadFeed(){

let snap = await get(ref(db,"posts"));

let html="";

if(snap.exists()){

snap.forEach(post=>{

let p=post.val();

html += 
<hr>
<h3>${p.author}</h3>
<p>${p.text}</p>
;

});

}

document.getElementById("feed").innerHTML=html;

}

</script>

</body>
</html>
